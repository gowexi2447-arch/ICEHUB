<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICE,_ud</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* ENTER SCREEN */

#enter{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
letter-spacing:4px;
cursor:pointer;
z-index:10;
}

#enter:hover{
color:#5865F2;
}

/* PARTICLES */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* CENTER */

.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */

.card{
background:rgba(20,20,20,0.9);
padding:40px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(0,0,0,0.8);
animation:float 5s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* PROFILE */

.avatar{
width:110px;
height:110px;
border-radius:50%;
margin-bottom:10px;
border:3px solid #5865F2;
object-fit:cover;
}

.name{
font-size:24px;
font-weight:bold;
}

.country{
font-size:14px;
color:#aaa;
margin-top:4px;
}

.lang{
font-size:13px;
color:#777;
margin-bottom:10px;
}

/* COUNTER */

.counter{
font-size:12px;
color:#7cff7c;
margin-bottom:15px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:12px;
justify-content:center;
}

button{
padding:10px 22px;
border:none;
border-radius:8px;
background:#5865F2;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.1);
box-shadow:
0 0 10px #5865F2,
0 0 20px #5865F2,
0 0 40px #5865F2;
}

/* DOWNLOAD BAR */

.progress{
width:100%;
height:8px;
background:#222;
border-radius:10px;
margin-top:15px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#5865F2;
}

/* MUSIC */

.music{
margin-top:25px;
border-radius:10px;
overflow:hidden;
}

</style>
</head>

<body>

<div id="enter" onclick="enterSite()">CLICK TO ENTER</div>

<div id="particles-js"></div>

<div class="container">

<div class="card">

<img class="avatar" src="https://yt3.googleusercontent.com/Q7h_gYI3YaAYfG7U5k8cLzmy73SIIknCcthpSz6NzcW2YXQQ3D2C794jZmYOYugWsXgevsV0HJo=s160-c-k-c0x00ffffff-no-rj">

<div class="name">ICE,_ud</div>

<div class="country">NORWAY</div>

<div class="lang">C++ / py / lua</div>

<div id="counter" class="counter"></div>

<div class="buttons">

<button onclick="cheats()">CHEATS</button>

<button onclick="spoofer()">SPOOFER</button>

<button onclick="discord()">DISCORD</button>

</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="music">

<iframe id="music"
width="300"
height="120"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fxckfame10/polka-znayu-hoodtrap-remix&auto_play=false">
</iframe>

</div>

</div>

</div>

<script>

/* ENTER */

function enterSite(){

document.getElementById("enter").style.display="none"

/* start music after click */

document.getElementById("music").src =
"https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fxckfame10/polka-znayu-hoodtrap-remix&auto_play=true"

}

/* FAKE USERS */

function updateUsers(){

let users = 1000 + Math.floor(Math.random()*120)

document.getElementById("counter").innerText =
users + " users online"

}

setInterval(updateUsers,3000)

updateUsers()

/* DOWNLOAD ANIMATION */

function startDownload(link){

let progress=document.querySelector(".progress")
let bar=document.getElementById("bar")

progress.style.display="block"

let width=0

let interval=setInterval(()=>{

width+=4
bar.style.width=width+"%"

if(width>=100){

clearInterval(interval)

setTimeout(()=>{
window.open(link)
},400)

}

},80)

}

/* BUTTONS */

function cheats(){
startDownload("https://gofile.io/d/OQtiT6")
}

function spoofer(){
startDownload("https://gofile.io/d/9BqRzw")
}

function discord(){
window.open("https://discord.gg/nYZZhtYGa4")
}

/* PARTICLES */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#5865F2"
}
}
})

</script>

</body>
</html>
