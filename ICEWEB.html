<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient glow overlay */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50px;
            color: #00ff9d;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff00ff, #ff69b4, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.2;
            animation: gradientText 3s ease infinite;
            text-shadow: 0 0 80px rgba(255, 0, 255, 0.5);
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .stats {
            color: #808080;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .cta-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: linear-gradient(135deg, #ff00ff, #ff69b4);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.4);
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(255, 0, 255, 0.6);
        }

        .links-section {
            margin-top: 4rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 2rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.1), rgba(255, 105, 180, 0.1));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .link-card:hover::before {
            opacity: 1;
        }

        .link-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 0, 255, 0.5);
            box-shadow: 0 20px 60px rgba(255, 0, 255, 0.3);
        }

        .link-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.5));
        }

        .link-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .link-description {
            color: #b0b0b0;
            font-size: 0.9rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .link-arrow {
            margin-top: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff00ff;
            font-size: 1.2rem;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .link-card:hover .link-arrow {
            background: rgba(255, 0, 255, 0.4);
            transform: translateX(5px);
        }

        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            color: #808080;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 1rem;
            }
        }

        /* Particles effect */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 0, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <script>
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <!-- Hidden SoundCloud Player -->
    <div id="soundcloudPlayer" style="position: fixed; bottom: -200px; left: -200px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

    <div class="container">
        <div class="header">
            <div class="badge">✨ Active & Ready</div>
            <h1 class="title">ZOMBIE HUB</h1>
            <p class="subtitle">use ai cheats across platforms</p>
            <p class="stats">all you need is a working device</p>
        </div>

        <div class="links-section">
            <h2 class="section-title">Featured Links</h2>
            <div class="links-grid" id="linksContainer"></div>
        </div>

        <div class="footer">
            Made with style • Edit links in the code
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        // 🎵 BACKGROUND MUSIC SETTINGS
        // ═══════════════════════════════════════════════════════════
        // To get your SoundCloud URL:
        // 1. Go to your song on SoundCloud
        // 2. Click "Share" button
        // 3. Click "Embed" tab
        // 4. Copy the URL from the iframe src (the part in quotes after src=)
        // 5. Paste it below in SOUNDCLOUD_EMBED_URL
        
        const MUSIC_SETTINGS = {
            enabled: true,  // Set to false to disable music
            autoplay: true, // Auto-play when page loads (may require user click in some browsers)
            SOUNDCLOUD_EMBED_URL: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/vairek/gotham-love-hoodtrap-prod&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false'
        };

        // Load background music
        if (MUSIC_SETTINGS.enabled && MUSIC_SETTINGS.SOUNDCLOUD_EMBED_URL) {
            const playerContainer = document.getElementById('soundcloudPlayer');
            const iframe = document.createElement('iframe');
            iframe.width = "100%";
            iframe.height = "166";
            iframe.scrolling = "no";
            iframe.frameborder = "no";
            iframe.allow = "autoplay";
            iframe.src = MUSIC_SETTINGS.SOUNDCLOUD_EMBED_URL;
            playerContainer.appendChild(iframe);
        }

        // ═══════════════════════════════════════════════════════════
        // 📝 ADD YOUR LINKS HERE - Just copy and paste this format:
        // {
        //     icon: '🤖',
        //     title: 'Your Link Title',
        //     description: 'Short description',
        //     url: 'https://your-link-here.com'
        // },
        // ═══════════════════════════════════════════════════════════
        
        const LINKS = [
            {
                icon: '🤖',
                title: 'AXIOM AI',
                description: 'Description for your first link',
                url: 'https://gofile.io/d/425VJZ'
            },
            {
                icon: '🤖',
                title: 'AIMMY AI',
                description: 'Description for your second link',
                url: 'https://gofile.io/d/tRjpWL'
            },
            {
                icon: '📜',
                title: 'DOWN!',
                description: 'Description for your third link',
                url: 'https://example.com'
            },
            {
                icon: '📜',
                title: 'DOWN!',
                description: 'Description for your fourth link',
                url: 'https://example.com'
            }
        ];

        // ═══════════════════════════════════════════════════════════
        // Don't edit below unless customizing design
        // ═══════════════════════════════════════════════════════════

        const container = document.getElementById('linksContainer');

        LINKS.forEach((link, index) => {
            const card = document.createElement('a');
            card.className = 'link-card';
            card.href = link.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.style.animationDelay = `${index * 0.1 + 0.3}s`;
            
            card.innerHTML = `
                <div class="link-icon">${link.icon}</div>
                <div class="link-title">${link.title}</div>
                <div class="link-description">${link.description}</div>
                <div class="link-arrow">→</div>
            `;
            
            container.appendChild(card);
        });
    </script>
</body>
</html>
